<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张明 - 全栈开发工程师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #3B82F6;
            --primary-dark: #1D4ED8;
            --bg-white: #FFFFFF;
            --bg-light: #F8FAFC;
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #FFFFFF 50%, #F0F9FF 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .card {
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 48px 40px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--bg-white);
            box-shadow: var(--shadow), 0 0 0 4px var(--primary-light);
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-placeholder svg {
            width: 60px;
            height: 60px;
            color: white;
            opacity: 0.9;
        }

        .name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .title {
            font-size: 1.125rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .location {
            font-size: 0.875rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .section {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .section:nth-child(2) {
            animation-delay: 0.1s;
        }

        .section:nth-child(3) {
            animation-delay: 0.2s;
        }

        .section:nth-child(4) {
            animation-delay: 0.3s;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .about-text {
            color: var(--text-gray);
            font-size: 1rem;
            line-height: 1.8;
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: default;
        }

        .skill-tag:hover {
            transform: translateY(-2px);
        }

        .skill-tag.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .skill-tag.secondary {
            background: var(--bg-light);
            color: var(--text-dark);
            border: 1px solid var(--border);
        }

        .skill-tag.secondary:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9375rem;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            background: var(--bg-white);
            color: var(--text-dark);
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
            color: var(--primary);
        }

        .contact-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .contact-btn.primary-contact {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .contact-btn.primary-contact:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            border-color: transparent;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            color: var(--text-gray);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 16px;
            }

            .card {
                padding: 32px 24px;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .name {
                font-size: 1.75rem;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }

            .contact-btn {
                padding: 12px 16px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }

            .avatar {
                width: 90px;
                height: 90px;
            }

            .name {
                font-size: 1.5rem;
            }

            .title {
                font-size: 1rem;
            }

            .section {
                margin-bottom: 24px;
            }
        }
    </style>
</head>
